
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumora</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

header{
    padding:60px 20px;
}

h1{
    font-size:50px;
    color:#38bdf8;
}

p{
    margin-top:15px;
    font-size:20px;
    color:#cbd5e1;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
}

section{
    padding:60px 20px;
}

.card{
    background:#1e293b;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:15px;
}

footer{
    padding:25px;
    color:#94a3b8;
}
</style>

</head>
<body>

<header>
<h1>✨ Lumora</h1>
<p>Building the Future with Innovation</p>
<a href="#" class="btn">Explore</a>
</header>

<section>
<div class="card">
<h2>Welcome</h2>
<p>
This is the official Lumora website.
More features, projects, and updates will be added soon.
</p>
</div>
</section>

<footer>
© 2026 Lumora. All Rights Reserved.
</footer>

</body>
</html>
